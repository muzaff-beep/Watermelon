  <rect x="85" y="200" rx="45" ry="55" width="45" height="195" fill="#4CF38A" opacity="0.9"/>
  <rect x="382" y="200" rx="45" ry="55" width="45" height="195" fill="#4CF38A" opacity="0.9"/>

