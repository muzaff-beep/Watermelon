name: Watermelon Build Judge
on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build & unit tests
        run: ./gradlew build test
      - name: Run benchmarks
        run: ./gradlew :benchmarks:connectedCheck

  interface-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify interface consistency
        run: python3 scripts/verify_interfaces.py

  migration-ladder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: Run migration tests
        run: ./gradlew :library-storage:connectedCheck -Pandroid.testInstrumentationRunnerArguments.class=com.watermelon.storage.db.MigrationTest
